version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: charity_db
    restart: always
    environment:
      POSTGRES_DB: charity_db
      POSTGRES_USER: charity_user
      POSTGRES_PASSWORD: charity_secure_pass_123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
